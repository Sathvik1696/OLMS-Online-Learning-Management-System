{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - OCMS</title>
    <!-- Styles -->
    <link rel="stylesheet" href="{% static 'frontend_app/css/style.css' %}">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <!-- Simple Navbar for Auth Pages -->
    <nav class="navbar" style="background: transparent; border: none;">
        <div class="container nav-container">
            <div class="nav-logo">
                <a href="index.html">
                    <i class="fa-solid fa-graduation-cap"></i>
                    <span>OCMS</span>
                </a>
            </div>
            <a href="index.html" class="btn btn-outline" style="padding: 0.5rem 1rem; border: none;"><i
                    class="fa-solid fa-arrow-left" style="margin-right: 8px;"></i> Back to Home</a>
        </div>
    </nav>

    <div class="auth-container">
        <!-- Decorative Background Elements -->
        <div
            style="position: absolute; top: 20%; left: 5%; width: 400px; height: 400px; background: var(--accent); filter: blur(150px); opacity: 0.1; border-radius: 50%; z-index: -1;">
        </div>
        <div
            style="position: absolute; bottom: 5%; right: 15%; width: 350px; height: 350px; background: var(--primary); filter: blur(150px); opacity: 0.15; border-radius: 50%; z-index: -1;">
        </div>

        <div class="auth-card glass-panel animate-fade-in" style="max-width: 500px;">
            <div class="auth-header">
                <h2>Create an Account</h2>
                <p>Start your learning journey today</p>
            </div>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;"
                    class="animate-fade-in delay-100">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" class="form-control" placeholder="John" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" class="form-control" placeholder="Doe" required>
                    </div>
                </div>

                <div class="form-group animate-fade-in delay-100">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                </div>

                <div class="form-group animate-fade-in delay-200">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Create a strong password"
                        required>
                </div>

                <div class="form-group animate-fade-in delay-200">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="Repeat your password"
                        required>
                </div>

                <div class="form-group animate-fade-in delay-300" style="margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        Create Account <i class="fa-solid fa-user-plus" style="margin-left: 8px;"></i>
                    </button>
                </div>
            </form>

            <div class="auth-footer animate-fade-in delay-300">
                Already have an account? <a href="login.html">Log in here</a>
            </div>
        </div>
    </div>

    <script src="{% static 'frontend_app/js/main.js' %}"></script>
    <script>
        function handleRegister(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }

            // TODO: Integrate with Django DRF endpoint (e.g., /api/register/)
            console.log('Registering user...');

            // In a real app, this would hit /api/auth/register/
            alert('Registration simulated successfully! Redirecting to login...');
            window.location.href = "{% url 'login' %}";
        }
    </script>
</body>

</html>
