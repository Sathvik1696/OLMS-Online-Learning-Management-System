{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OCMS</title>
    <!-- Styles -->
    <link rel="stylesheet" href="{% static 'frontend_app/css/style.css' %}">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <!-- Simple Navbar for Auth Pages -->
    <nav class="navbar" style="background: transparent; border: none;">
        <div class="container nav-container">
            <div class="nav-logo">
                <a href="index.html">
                    <i class="fa-solid fa-graduation-cap"></i>
                    <span>OCMS</span>
                </a>
            </div>
            <a href="index.html" class="btn btn-outline" style="padding: 0.5rem 1rem; border: none;"><i
                    class="fa-solid fa-arrow-left" style="margin-right: 8px;"></i> Back to Home</a>
        </div>
    </nav>

    <div class="auth-container">
        <!-- Decorative Background Elements -->
        <div
            style="position: absolute; top: 10%; left: 10%; width: 300px; height: 300px; background: var(--secondary); filter: blur(150px); opacity: 0.15; border-radius: 50%; z-index: -1;">
        </div>
        <div
            style="position: absolute; bottom: 10%; right: 10%; width: 400px; height: 400px; background: var(--primary); filter: blur(150px); opacity: 0.15; border-radius: 50%; z-index: -1;">
        </div>

        <div class="auth-card glass-panel animate-fade-in">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Enter your credentials to access your account</p>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group animate-fade-in delay-100">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                </div>

                <div class="form-group animate-fade-in delay-200">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                        <label for="password" style="margin-bottom: 0;">Password</label>
                        <a href="#" style="font-size: 0.875rem; color: var(--primary);">Forgot password?</a>
                    </div>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>

                <div class="form-group animate-fade-in delay-300" style="margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        Sign In <i class="fa-solid fa-right-to-bracket" style="margin-left: 8px;"></i>
                    </button>
                </div>
            </form>

            <div class="auth-footer animate-fade-in delay-300">
                Don't have an account? <a href="register.html">Sign up</a>
            </div>
        </div>
    </div>

    <script src="{% static 'frontend_app/js/main.js' %}"></script>
    <script>
        function handleLogin(e) {
            e.preventDefault();
            // TODO: Integrate with Django DRF endpoint (e.g., /api/token/)
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Simulation
            console.log('Logging in with:', email);
            // Store a fake token
            localStorage.setItem('access_token', 'fake-jwt-token-for-demo');
            window.location.href = "{% url 'dashboard' %}";
        }
    </script>
</body>

</html>
